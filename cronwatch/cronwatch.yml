# cronwatch configuration

log_file: cronwatch.log
check_interval: 60

alerts:
  email: ops@example.com
  webhook_url: null
  slack_channel: null

jobs:
  - name: daily-backup
    schedule: "0 2 * * *"
    timeout: 1800
    alert_on_failure: true
    alert_on_timeout: true
    retries: 2
    tags:
      - backup
      - critical

  - name: hourly-sync
    schedule: "0 * * * *"
    timeout: 300
    alert_on_failure: true
    alert_on_timeout: false
    retries: 3
    tags:
      - sync

  - name: weekly-report
    schedule: "0 9 * * 1"
    timeout: 600
    alert_on_failure: true
    alert_on_timeout: true
    retries: 1
    tags:
      - reporting
