# cronwatch configuration

history_path: ~/.cronwatch/history.json

retention:
  max_age_days: 30
  max_entries: 500

alert:
  email: ops@example.com
  on_failure: true
  on_timeout: true
  on_slow: false

jobs:
  - name: daily-backup
    command: /usr/local/bin/backup.sh
    schedule: "0 2 * * *"
    timeout: 3600
    max_duration: 1800

  - name: health-check
    command: /usr/local/bin/healthcheck.sh
    schedule: "*/5 * * * *"
    timeout: 30

  - name: weekly-report
    command: /usr/local/bin/report.py
    schedule: "0 9 * * 1"
    max_duration: 600
